<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Оплата прошла успешно!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Space Grotesk',sans-serif;
      background:#080810;
      color:#f0f0f5;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      text-align:center;padding:24px;
    }
    .card{
      max-width:440px;width:100%;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:28px;padding:52px 40px;
      position:relative;overflow:hidden;
      animation:fadeIn .6s ease;
    }
    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(200,169,126,0.7),transparent);
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .check-circle{
      width:80px;height:80px;border-radius:50%;margin:0 auto 28px;
      background:rgba(74,222,128,0.1);border:2px solid rgba(74,222,128,0.4);
      display:flex;align-items:center;justify-content:center;
      font-size:36px;animation:popIn .5s .2s ease both;
    }
    @keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}
    h1{font-size:28px;font-weight:700;letter-spacing:-1px;margin-bottom:12px;color:#fff;}
    .sub{font-size:16px;color:#6b6b80;line-height:1.6;margin-bottom:36px;}
    .sub b{color:#9090a8;}
    .btn{
      display:flex;align-items:center;justify-content:center;gap:10px;
      background:#fff;color:#080810;font-weight:700;font-size:16px;
      padding:17px;border-radius:100px;text-decoration:none;
      letter-spacing:-0.3px;transition:opacity .2s,transform .2s;
      box-shadow:0 20px 60px rgba(255,255,255,0.1);
      margin-bottom:16px;
    }
    .btn:hover{opacity:.88;transform:translateY(-2px);}
    .timer{font-size:13px;color:#6b6b80;margin-top:8px;}
    .timer span{color:#c8a97e;font-weight:600;}
    .progress{
      height:3px;background:rgba(255,255,255,0.06);border-radius:100px;
      margin-top:24px;overflow:hidden;
    }
    .progress-bar{
      height:100%;background:linear-gradient(90deg,#c8a97e,#e8d5b0);
      border-radius:100px;width:0%;
      transition:width linear;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="check-circle">✓</div>
  <h1>Оплата прошла!</h1>
  <p class="sub">
    Спасибо за покупку 🎉<br>
    <b>Уроки уже отправляются</b> тебе в Telegram.<br>
    Переводим обратно в бот...
  </p>
  <a href="https://t.me/AIAvatarCourseBot?start=payment_success" class="btn" id="btn">
    ➡ Открыть бот и получить уроки
  </a>
  <p class="timer">Автоматический переход через <span id="cnt">5</span> сек</p>
  <div class="progress"><div class="progress-bar" id="bar"></div></div>
</div>

<script>
  // Авто-редирект через 5 секунд
  let t = 5;
  const cnt = document.getElementById('cnt');
  const bar = document.getElementById('bar');

  // Запускаем прогресс-бар
  setTimeout(() => { bar.style.transitionDuration = '5s'; bar.style.width = '100%'; }, 100);

  const iv = setInterval(() => {
    t--;
    cnt.textContent = t;
    if(t <= 0){
      clearInterval(iv);
      window.location.href = 'https://t.me/AIAvatarCourseBot?start=payment_success';
    }
  }, 1000);
</script>
</body>
</html>
